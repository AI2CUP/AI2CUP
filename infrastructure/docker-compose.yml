version: '3.9'

services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: ../../infrastructure/docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../apps/backend:/app  # For hot-reloading code modifications and persist model/data 
    environment:
      - AI2CUP_DEBUG=false
      - AI2CUP_AUTO_TRAIN_ON_STARTUP=true
      - AI2CUP_CORS_ORIGINS=["http://localhost","http://localhost:3000","http://127.0.0.1"]
    restart: unless-stopped

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: ../../infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
