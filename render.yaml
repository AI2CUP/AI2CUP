services:
  - type: web
    name: ai2cup-backend
    runtime: python
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AI2CUP_DATABASE_URL
        sync: false
      - key: AI2CUP_DEBUG
        value: false
      - key: AI2CUP_AUTO_TRAIN_ON_STARTUP
        value: "false"
      - key: AI2CUP_CORS_ORIGINS
        sync: false
      - key: AI2CUP_JWT_SECRET
        sync: false
      - key: AI2CUP_HF_TOKEN
        sync: false
    plan: free
